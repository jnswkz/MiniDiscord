services:
  # ─── Infrastructure ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: minidiscord-redis
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - minidiscord-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  discovery-server:
    image: ghcr.io/phatnguyentt2/minidiscord-eureka:latest
    container_name: minidiscord-eureka
    restart: always
    expose:
      - "8761"
    environment:
      - EUREKA_HOSTNAME=discovery-server
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - minidiscord-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ─── Core Services ──────────────────────────────
  api-gateway:
    image: ghcr.io/phatnguyentt2/minidiscord-gateway:latest
    container_name: minidiscord-gateway
    restart: always
    ports:
      - "127.0.0.1:8080:8080"  # ⚠️ Chỉ bind localhost — Nginx proxy vào, không expose ra Internet
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      resources:
        limits:
          memory: 300M
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minidiscord-net

  user-service:
    image: ghcr.io/phatnguyentt2/minidiscord-user:latest
    container_name: minidiscord-user
    restart: always
    expose:
      - "8081"
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M   # ↑ Tăng từ 400M nhờ Droplet 2GB RAM
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net

networks:
  minidiscord-net:
    driver: bridge
