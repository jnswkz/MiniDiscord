server:
  port: 8085

spring:
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: discord-mini-files

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
