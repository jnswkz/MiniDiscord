services:
  # ─── Infrastructure ────────────────────────────────
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: minidiscord-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=discovery-server
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - minidiscord-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Core Services (default profile) ───────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: minidiscord-user
    ports:
      - "8081:8081"
    env_file:
      - ./user-service/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: minidiscord-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net

  # ─── Phase P2+ Services (full profile) ─────────────
  group-channel-service:
    build:
      context: .
      dockerfile: group-channel-service/Dockerfile
    container_name: minidiscord-group-channel
    ports:
      - "8082:8082"
    env_file:
      - ./group-channel-service/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    profiles:
      - full

  chat-history-service:
    build:
      context: .
      dockerfile: chat-history-service/Dockerfile
    container_name: minidiscord-chat-history
    ports:
      - "8083:8083"
    env_file:
      - ./chat-history-service/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    profiles:
      - full

  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    container_name: minidiscord-messaging
    ports:
      - "8084:8084"
    env_file:
      - ./messaging-service/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    profiles:
      - full

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: minidiscord-file
    ports:
      - "8085:8085"
    env_file:
      - ./file-service/.env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    profiles:
      - full

  # config-server: Uncomment khi cần (tốn ~300-500MB RAM, chưa service nào dùng)
  # config-server:
  #   build:
  #     context: .
  #     dockerfile: config-server/Dockerfile
  #   container_name: minidiscord-config
  #   ports:
  #     - "8888:8888"
  #   environment:
  #     - EUREKA_URL=http://discovery-server:8761/eureka/
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #   depends_on:
  #     discovery-server:
  #       condition: service_healthy
  #   networks:
  #     - minidiscord-net

  # ─── Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: minidiscord-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - WATCHPACK_POLLING=true  # Fix hot-reload trên Windows/WSL
    volumes:
      - ../frontend:/app          # Bind-mount source code → hot-reload
      - /app/node_modules         # Anonymous volume → giữ node_modules trong container
      - /app/.next                # Anonymous volume → giữ .next cache trong container
    depends_on:
      - api-gateway
    networks:
      - minidiscord-net

networks:
  minidiscord-net:
    driver: bridge
