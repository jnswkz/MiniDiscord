services:
  # ─── Infrastructure ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: minidiscord-redis
    restart: on-failure
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - minidiscord-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: minidiscord-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=discovery-server
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - minidiscord-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Core Services ─────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: minidiscord-user
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_URL=${USER_DB_URL}
      - DB_USERNAME=${USER_DB_USERNAME}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: minidiscord-gateway
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_SSL=false
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure

  # ─── Additional Services ───────────────────────────
  group-channel-service:
    build:
      context: .
      dockerfile: group-channel-service/Dockerfile
    container_name: minidiscord-group-channel
    expose:
      - "8082"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_URL=${GROUP_DB_URL}
      - DB_USERNAME=${GROUP_DB_USERNAME}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure

  chat-history-service:
    build:
      context: .
      dockerfile: chat-history-service/Dockerfile
    container_name: minidiscord-chat-history
    expose:
      - "8083"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure

  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    container_name: minidiscord-messaging
    expose:
      - "8084"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_SSL=false
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: minidiscord-file
    expose:
      - "8085"
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - minidiscord-net
    restart: on-failure

networks:
  minidiscord-net:
    driver: bridge
