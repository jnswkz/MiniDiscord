name: Deploy Backend to Heroku
on:
  push:
    branches: [main]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/user-service/**'
      - 'backend/common-lib/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy-user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build User Service JAR
        working-directory: backend
        run: mvn -pl common-lib,user-service -am clean package -DskipTests -q

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku Stack to Container
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku stack:set container --app minidiscord-user-9b155a4891e0

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login

      - name: Build & Push Docker Image
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          cat > Dockerfile.user <<'EOF'
          FROM eclipse-temurin:17-jre-alpine
          WORKDIR /app
          COPY backend/user-service/target/*.jar app.jar
          CMD java -Dspring.profiles.active=prod -Dserver.port=$PORT -jar app.jar
          EOF
          docker build -f Dockerfile.user -t registry.heroku.com/minidiscord-user-9b155a4891e0/web .
          docker push registry.heroku.com/minidiscord-user-9b155a4891e0/web

      - name: Release to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release web --app minidiscord-user-9b155a4891e0
          heroku ps:scale web=1 --app minidiscord-user-9b155a4891e0

  deploy-api-gateway:
    runs-on: ubuntu-latest
    needs: deploy-user-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build API Gateway JAR
        working-directory: backend
        run: mvn -pl common-lib,api-gateway -am clean package -DskipTests -q

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku Stack to Container
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku stack:set container --app minidiscord-gateway-bbc581926938

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login

      - name: Build & Push Docker Image
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          cat > Dockerfile.gateway <<'EOF'
          FROM eclipse-temurin:17-jre-alpine
          WORKDIR /app
          COPY backend/api-gateway/target/*.jar app.jar
          CMD java -Dspring.profiles.active=prod -Dserver.port=$PORT -jar app.jar
          EOF
          docker build -f Dockerfile.gateway -t registry.heroku.com/minidiscord-gateway-bbc581926938/web .
          docker push registry.heroku.com/minidiscord-gateway-bbc581926938/web

      - name: Release to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release web --app minidiscord-gateway-bbc581926938
          heroku ps:scale web=1 --app minidiscord-gateway-bbc581926938