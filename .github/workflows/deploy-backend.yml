name: Deploy Backend to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/phatnguyentt2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      group-channel: ${{ steps.filter.outputs.group-channel }}
      chat-history: ${{ steps.filter.outputs.chat-history }}
      messaging: ${{ steps.filter.outputs.messaging }}
      file: ${{ steps.filter.outputs.file }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            eureka:
              - 'backend/discovery-server/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            gateway:
              - 'backend/api-gateway/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            user:
              - 'backend/user-service/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            group-channel:
              - 'backend/group-channel-service/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            chat-history:
              - 'backend/chat-history-service/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            messaging:
              - 'backend/messaging-service/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'
            file:
              - 'backend/file-service/**'
              - 'backend/common-lib/**'
              - 'backend/pom.xml'

  build-and-push:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: discovery-server
            image: minidiscord-eureka
            filter: eureka
          - service: api-gateway
            image: minidiscord-gateway
            filter: gateway
          - service: user-service
            image: minidiscord-user
            filter: user
          - service: group-channel-service
            image: minidiscord-group-channel
            filter: group-channel
          - service: chat-history-service
            image: minidiscord-chat-history
            filter: chat-history
          - service: messaging-service
            image: minidiscord-messaging
            filter: messaging
          - service: file-service
            image: minidiscord-file
            filter: file
    
    steps:
      - name: Checkout repository
        if: needs.changes.outputs[matrix.filter] == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: needs.changes.outputs[matrix.filter] == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.changes.outputs[matrix.filter] == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        if: needs.changes.outputs[matrix.filter] == 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && !contains(needs.build-and-push.result, 'failure') && !contains(needs.build-and-push.result, 'cancelled')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/minidiscord
            
            # Pull new images
            echo "=== Pulling new images ==="
            docker compose -f docker-compose.prod.yml pull
            
            # Restart infra first (wait for them to be healthy)
            echo "=== Restarting infrastructure ==="
            docker compose -f docker-compose.prod.yml up -d redis
            docker compose -f docker-compose.prod.yml up -d discovery-server
            
            echo "⏳ Waiting for Eureka to warm up..."
            sleep 30
            
            # Start all business services
            echo "=== Restarting business services ==="
            docker compose -f docker-compose.prod.yml up -d \
              api-gateway user-service group-channel-service \
              chat-history-service messaging-service file-service
            
            echo "⏳ Waiting for services to stabilize..."
            sleep 20
            
            # Health check status
            echo "=== Service Status ==="
            docker compose -f docker-compose.prod.yml ps
            
            # Aggressive cleanup to save disk space
            echo "=== Aggressive Disk Cleanup ==="
            docker system prune -a -f --volumes
            
            # Show disk space
            echo "=== Current Disk Usage ==="
            df -h /