<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MiniPortal - SSO Demo</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    button { background: #4285F4; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 15px;}
    button:hover { background: #357ae8; }
    p { color: #666; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MiniPortal SSO</h1>
    <p>Ứng dụng thứ hai dùng chung Google IdP để demo Single Sign-On.</p>
    <button onclick="login()">Login with Google</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
